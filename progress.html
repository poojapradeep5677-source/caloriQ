<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitLedger - Progress</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="progressPage">
    <div class="top-nav">
        <h2 style="color: var(--primary-dark); margin:0;">FitLedger 🌿</h2>
    </div>

    <div class="wrapper" style="padding-bottom: 90px;">
        <h2 style="margin: 0;">Progress 📈</h2>

        <div class="card" style="flex-direction: row; justify-content: space-around; padding: 15px;">
            <div style="text-align:center"><div class="stat-value" id="progBmi">-</div><div class="stat-name">BMI</div></div>
            <div style="text-align:center"><div class="stat-value" id="progBmr">-</div><div class="stat-name">BMR</div></div>
            <div style="text-align:center"><div class="stat-value" id="progGoal">-</div><div class="stat-name">Goal</div></div>
        </div>

        <div class="card">
            <h3 class="card-title">Weight Progress 📈</h3>
            <canvas id="chartCanvas" width="400" height="250"></canvas>
        </div>
    </div>

    <div class="bottom-bar">
        <div class="nav-links">
            <a href="index.html" class="nav-item"><span>🏠</span>Home</a>
            <a href="meals.html" class="nav-item"><span>🍲</span>Meals</a>
            <a href="summary.html" class="nav-item"><span>📊</span>Summary</a>
            <a href="goals.html" class="nav-item"><span>🎯</span>Goals</a>
            <a href="progress.html" class="nav-item"><span>📈</span>Progress</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

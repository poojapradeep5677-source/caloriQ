<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitLedger - Summary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="summaryPage">
    <div class="top-nav">
        <h2 style="color: var(--primary-dark); margin:0;">FitLedger 🌿</h2>
    </div>

    <div class="wrapper" style="padding-bottom: 90px;">
        <h2 style="margin: 0;">Daily Summary 📊</h2>
        
        <div class="card">
            <h3 class="card-title">Calories Section</h3>
            <div class="stat-row"><span class="stat-name">Consumed</span><span class="stat-value" id="sumCalCons">-</span></div>
            <div class="stat-row"><span class="stat-name">Burned</span><span class="stat-value" id="sumCalBurn">-</span></div>
            <div class="stat-row"><span class="stat-name">Remaining</span><span class="stat-value" id="sumCalRem" style="color:var(--primary)">-</span></div>
        </div>

        <div class="card">
            <h3 class="card-title">Nutrition Tracking</h3>
            <div class="stat-row"><span class="stat-name">Protein</span><span class="stat-value" id="sumProt">-</span></div>
            <div class="stat-row"><span class="stat-name">Carbs</span><span class="stat-value" id="sumCarb">-</span></div>
            <div class="stat-row"><span class="stat-name">Fat</span><span class="stat-value" id="sumFat">-</span></div>
        </div>

        <div class="card">
            <h3 class="card-title">Recent Meals Logging</h3>
            <div id="recentMealsList" style="display: flex; flex-direction: column; gap: 5px;"></div>
        </div>
    </div>

    <div class="bottom-bar">
        <div class="nav-links">
            <a href="index.html" class="nav-item"><span>🏠</span>Home</a>
            <a href="meals.html" class="nav-item"><span>🍲</span>Meals</a>
            <a href="summary.html" class="nav-item"><span>📊</span>Summary</a>
            <a href="goals.html" class="nav-item"><span>🎯</span>Goals</a>
            <a href="progress.html" class="nav-item"><span>📈</span>Progress</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

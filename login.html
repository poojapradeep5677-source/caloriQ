<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitLedger - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="loginPage">
    <div class="wrapper" style="margin: auto; max-width: 400px; padding-top: 50px;">
        <h1 class="logo">FitLedger 🌿</h1>
        <p class="subtitle">Welcome to FitLedger</p>
        <form id="loginForm" class="card">
            <div class="input-group">
                <label>Name</label>
                <input type="text" id="name" required placeholder="Your Name">
            </div>
            <div class="input-group">
                <label>Age</label>
                <input type="number" id="age" required placeholder="E.g., 25">
            </div>
            <div class="input-group">
                <label>Height (cm)</label>
                <input type="number" id="height" required placeholder="E.g., 175">
            </div>
            <div class="input-group">
                <label>Weight (kg)</label>
                <input type="number" step="0.1" id="weight" required placeholder="E.g., 70">
            </div>
            <div class="input-group">
                <label>Gender</label>
                <select id="gender" required>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>
            <button type="submit" class="btn">Login 🚀</button>
        </form>
        <div class="bottom-msg">Start your fitness journey today 🚀</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
